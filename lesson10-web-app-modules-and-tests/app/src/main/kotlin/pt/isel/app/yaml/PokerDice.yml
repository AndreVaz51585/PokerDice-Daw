openapi: 3.0.0
info:
  title: API Poker Dice - DAW
  description: "Documentação detalhada de todas as rotas HTTP para o projeto de DAW. Autores: Diogo Teixeira (50506), Miguel Pinto (51557), André Vaz (51585)"
  version: "1.0.0"
servers:
  - url: http://localhost:8080

paths:
  /users:
    post:
      summary: Criar um novo utilizador
      description: Regista um novo utilizador no sistema. Requer um código de convite válido.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Diogo Teixeira"
                email:
                  type: string
                  format: email
                  example: "diogo@exemplo.com"
                password:
                  type: string
                  format: password
                  example: "passwordSegura123"
                invitationCode:
                  type: string
                  example: "convite-secreto-123"
      responses:
        '201':
          description: Utilizador criado com sucesso. A localização do novo recurso está no header 'Location'.
          headers:
            Location:
              schema:
                type: string
                example: "/api/users/1"
        '400':
          description: Pedido inválido (e.g., password insegura, código de convite necessário).
        '409':
          description: Conflito (e.g., e-mail ou código de convite já em uso).
        '500':
          description: Erro interno ao criar o utilizador.
    get:
      summary: Listar todos os utilizadores
      description: Retorna uma lista com todos os utilizadores registados no sistema.
      responses:
        '200':
          description: Lista de utilizadores retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{id}:
    delete:
      summary: Apagar um utilizador
      description: Remove um utilizador do sistema com base no seu ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Utilizador apagado com sucesso.
        '404':
          description: Utilizador não encontrado.
        '500':
          description: Erro interno ao apagar o utilizador.

  /users/token:
    post:
      summary: Obter um token de autenticação
      description: Autentica um utilizador com email e password e retorna um token de acesso.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "diogo@exemplo.com"
                password:
                  type: string
                  format: password
                  example: "passwordSegura123"
      responses:
        '200':
          description: Autenticação bem-sucedida.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "token-jwt-super-secreto"

  /logout:
    post:
      summary: Terminar a sessão (logout)
      description: Invalida o token de autenticação do utilizador. Requer autenticação.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sessão terminada com sucesso.

  /me:
    get:
      summary: Obter detalhes do utilizador autenticado
      description: Retorna as informações do utilizador atualmente autenticado.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Informações do utilizador.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserHome'

  /invitations:
    post:
      summary: Criar um convite
      description: Gera um novo código de convite para um utilizador autenticado.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Convite criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitationId:
                    type: string
                    example: "convite-gerado-456"

  /lobbies:
    post:
      summary: Criar um lobby
      description: Cria um novo lobby de jogo. Requer autenticação.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LobbyInput'
      responses:
        '201':
          description: Lobby criado com sucesso. A localização está no header 'Location'.
          headers:
            Location:
              schema:
                type: string
                example: "/api/lobbies/1"
        '404':
          description: Utilizador não encontrado.
    get:
      summary: Listar lobbies abertos
      description: Retorna uma lista de todos os lobbies que estão atualmente abertos.
      responses:
        '200':
          description: Lista de lobbies abertos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lobby'

  /lobbies/{id}:
    get:
      summary: Obter detalhes de um lobby
      description: Retorna as informações de um lobby específico pelo seu ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalhes do lobby.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lobby'
        '404':
          description: Lobby não encontrado.
    delete:
      summary: Sair de um lobby
      description: Permite que um utilizador autenticado saia de um lobby.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Saiu do lobby com sucesso.
        '400':
          description: Erro ao sair do lobby.
        '404':
          description: Lobby ou utilizador não encontrado no lobby.

  /lobbies/{id}/join:
    post:
      summary: Entrar num lobby
      description: Permite que um utilizador autenticado entre num lobby. Se o lobby ficar cheio, uma nova partida é criada.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entrou no lobby com sucesso.
        '201':
          description: Entrou no lobby e a partida começou. A localização da partida está no header 'Location'.
          headers:
            Location:
              schema:
                type: string
                example: "/api/matches/1"
        '400':
          description: Pedido inválido (lobby cheio, fechado, etc.).
        '404':
          description: Lobby ou utilizador não encontrado.

  /lobbies/{id}/players:
    get:
      summary: Listar jogadores de um lobby
      description: Retorna a lista de jogadores num lobby específico.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de jogadores.

  /lobbies/{id}/host:
    get:
      summary: Obter o anfitrião de um lobby
      description: Retorna o utilizador que criou (anfitrião) o lobby.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados do anfitrião.
        '404':
          description: Lobby ou anfitrião não encontrado.

  /matches:
    post:
      summary: Criar uma partida
      description: Cria uma nova partida a partir de um lobby.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchInput'
      responses:
        '201':
          description: Partida criada com sucesso.
          headers:
            Location:
              schema:
                type: string
                example: "/api/matches/1"
        '400':
          description: Pedido inválido (e.g., partida cheia).
        '404':
          description: Jogador não encontrado.
    get:
      summary: Listar todas as partidas
      description: Retorna uma lista de todas as partidas (implementação pendente).
      responses:
        '200':
          description: Lista de partidas.

  /matches/{id}:
    get:
      summary: Obter detalhes de uma partida
      description: Retorna as informações de uma partida específica pelo seu ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detalhes da partida.
        '404':
          description: Partida não encontrada.

  /matches/{id}/players:
    get:
      summary: Listar jogadores de uma partida
      description: Retorna a lista de jogadores numa partida específica.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de jogadores.
        '404':
          description: Partida não encontrada.

  /matches/{id}/start:
    post:
      summary: Iniciar uma partida
      description: Altera o estado de uma partida para 'RUNNING'.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Partida iniciada.
        '400':
          description: Estado inválido para iniciar.
        '404':
          description: Partida não encontrada.

  /matches/{id}/end:
    post:
      summary: Terminar uma partida
      description: Altera o estado de uma partida para 'FINISHED'.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Partida terminada.
        '400':
          description: Estado inválido para terminar.
        '404':
          description: Partida não encontrada.

  /matches/sse/{matchId}/events:
    get:
      summary: Subscrever eventos de uma partida (SSE)
      description: Estabelece uma conexão Server-Sent Events (SSE) para receber atualizações em tempo real de uma partida.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conexão SSE estabelecida. O stream contém eventos como 'match-snapshot', 'dice-rolled', 'turn-change'.
          content:
            text/event-stream:
              schema:
                type: string
    post:
      summary: Enviar um comando para uma partida (SSE)
      description: Envia um comando (e.g., rolar dados, segurar dados) para uma partida. Os resultados são transmitidos via SSE.
      security:
        - bearerAuth: []
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: "roll"
                indices:
                  type: array
                  items:
                    type: integer
                  example: [0, 2]
      responses:
        '200':
          description: Comando aceite. O resultado será transmitido via SSE.
        '400':
          description: Comando inválido, não é a sua vez, ou parâmetros incorretos.

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
    UserHome:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
    Lobby:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        state:
          type: string
          enum: [OPEN, CLOSED, RUNNING]
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
    LobbyInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        rounds:
          type: integer
        ante:
          type: integer
    MatchInput:
      type: object
      properties:
        lobbyId:
          type: integer
        totalRounds:
          type: integer
        ante:
          type: integer
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
