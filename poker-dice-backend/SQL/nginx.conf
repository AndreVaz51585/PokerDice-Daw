events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream jvm-static {
        server poker-dice-jvm-static:8080;
    }

    upstream jvm-dynamic {
        server poker-dice-jvm-dynamic:8080;
    }

    # Proxy para static (opcional, apenas debug/REST)
    server {
        listen 3000;
        server_name localhost;

        location / {
            proxy_pass http://jvm-static;
        }
    }

    # Proxy para dynamic (opcional, SSE direto)
    server {
        listen 3001;
        server_name localhost;

        location / {
            proxy_pass http://jvm-dynamic;
        }
    }

    # Frontend + API routing (porta 4000)
    server {
        listen 4000;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;


        location = /api/lobbies/events {
            proxy_pass http://jvm-dynamic;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        location ~ ^/api/lobbies/[0-9]+/events$ {
            proxy_pass http://jvm-dynamic;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        location ~ ^/api/matches/[0-9]+/events$ {
            proxy_pass http://jvm-dynamic;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }


        location = /api/lobbies {
            proxy_pass http://jvm-dynamic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/lobbies/[0-9]+/(join|leave)$ {
            proxy_pass http://jvm-dynamic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/api/matches/[0-9]+/commands$ {
            proxy_pass http://jvm-dynamic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        location /api/ {
            proxy_pass http://jvm-static;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }


        location /assets/ {
            try_files $uri =404;
        }


        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
